<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odell's Cooler Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: #111;
    padding: 14px 16px 10px;
    border-bottom: 3px solid #e63946;
  }

  .header h1 {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header p {
    font-size: 0.7rem;
    color: #888;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* ── SECTION TABS ── */
  .tabs {
    display: flex;
    overflow-x: auto;
    background: #1a1a1a;
    border-bottom: 2px solid #333;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 0 0 auto;
    padding: 10px 14px;
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    transition: all 0.15s;
  }

  .tab.active {
    color: #fff;
    border-bottom-color: #e63946;
  }

  .tab .tab-badge {
    display: inline-block;
    font-size: 0.55rem;
    padding: 1px 4px;
    border-radius: 2px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .tab .tab-badge.red    { background: #e63946; color: #fff; }
  .tab .tab-badge.orange { background: #f4a261; color: #111; }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 14px 16px 10px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-header h2 {
    font-size: 1rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .section-tag {
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: bold;
  }
  .section-tag.red    { background: #e63946; color: #fff; }
  .section-tag.orange { background: #f4a261; color: #111; }
  .section-tag.gray   { background: #333; color: #aaa; }

  /* ── SHELVES ── */
  .shelves { padding: 12px 16px; }

  .shelf {
    background: #1e1e2e;
    border-radius: 6px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid #333;
  }

  .shelf-header {
    background: #252535;
    padding: 7px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #333;
  }

  .shelf-name {
    font-size: 0.7rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #7ec8e3;
  }

  .shelf-slots {
    font-size: 0.65rem;
    color: #555;
  }

  /* ── PRODUCT ROWS ── */
  .product-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #2a2a3a;
  }
  .product-row:last-child { border-bottom: none; }

  .slot-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #333;
    color: #888;
    font-size: 0.65rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-right: 10px;
  }

  .product-info { flex: 1; }

  .product-name {
    font-size: 0.9rem;
    font-weight: bold;
    color: #fff;
  }

  .product-detail {
    font-size: 0.7rem;
    color: #888;
    margin-top: 1px;
  }

  .product-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .empty-row .product-name {
    color: #444;
    font-style: italic;
    font-weight: normal;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: #444;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.85rem; line-height: 1.7; }

  /* ── LEGEND ── */
  .legend {
    margin: 0 16px 16px;
    background: #1a1a1a;
    border-radius: 6px;
    padding: 12px;
    border: 1px solid #333;
  }

  .legend-title {
    font-size: 0.65rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .legend-items {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: #aaa;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Odell's Grocery — Cooler Map</h1>
  <p>Beer &amp; Alcohol · 10 Sections · Echo, Louisiana</p>
</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- SECTION HEADER -->
<div class="section-header">
  <h2 id="section-title">Section 1</h2>
  <span class="section-tag" id="section-tag">Singles</span>
</div>

<!-- SHELVES -->
<div class="shelves" id="shelves-container"></div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-title">Color Key</div>
  <div class="legend-items">
    <div class="legend-item"><div class="legend-dot" style="background:#e63946"></div> Singles</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f4a261"></div> Beer (packs)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7ec8e3"></div> Seltzer</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9b5de5"></div> Liquor</div>
    <div class="legend-item"><div class="legend-dot" style="background:#333; border:1px dashed #555"></div> Empty</div>
  </div>
</div>

<script>
const TYPE_COLOR = {
  single:  '#e63946',
  beer:    '#f4a261',
  seltzer: '#7ec8e3',
  liquor:  '#9b5de5',
  empty:   '#333',
};

const sections = {
  1: {
    title: "Section 1",
    tag: "Singles", tagColor: "red",
    shelves: [
      {
        name: "Top Shelf", slots: 7,
        products: [
          { name: "Miller Lite",     detail: "16 oz single", type: "single" },
          { name: "Miller Lite",     detail: "24 oz single", type: "single" },
          { name: "Coors Light",     detail: "24 oz single", type: "single" },
          { name: "Coors Light",     detail: "24 oz single", type: "single" },
          { name: "Empty",           detail: "—",            type: "empty"  },
          { name: "Bud Light",       detail: "16 oz single", type: "single" },
          { name: "Michelob Ultra",  detail: "16 oz single", type: "single" },
        ]
      },
      { name: "Shelf 2", slots: 7, products: [] },
      { name: "Shelf 3", slots: 6, products: [] },
      { name: "Shelf 4", slots: 6, products: [] },
      {
        name: "Bottom Shelf", slots: null,
        products: [
          { name: "BuzzBallz", detail: "Assorted flavors", type: "single" },
        ]
      },
    ]
  },
  2:  { title: "Section 2",  tag: "Coming Soon", tagColor: "gray", shelves: [] },
  3:  { title: "Section 3",  tag: "Coming Soon", tagColor: "gray", shelves: [] },
  4:  { title: "Section 4",  tag: "Coming Soon", tagColor: "gray", shelves: [] },
  5:  { title: "Section 5",  tag: "Coming Soon", tagColor: "gray", shelves: [] },
  6:  { title: "Section 6",  tag: "Singles",     tagColor: "red",  shelves: [] },
  7:  { title: "Section 7",  tag: "Coming Soon", tagColor: "gray", shelves: [] },
  8:  { title: "Section 8",  tag: "Coming Soon", tagColor: "gray", shelves: [] },
  9:  { title: "Section 9",  tag: "Singles + Mixed", tagColor: "orange", shelves: [] },
  10: { title: "Section 10", tag: "Mixed",       tagColor: "orange", shelves: [] },
};

let current = 1;

function buildTabs() {
  const container = document.getElementById('tabs');
  for (let i = 1; i <= 10; i++) {
    const s = sections[i];
    let badge = '';
    if (s.tagColor === 'red')    badge = `<span class="tab-badge red">S</span>`;
    if (s.tagColor === 'orange') badge = `<span class="tab-badge orange">M</span>`;
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 1 ? ' active' : '');
    btn.id = `tab-${i}`;
    btn.innerHTML = `${i}${badge}`;
    btn.onclick = () => showSection(i);
    container.appendChild(btn);
  }
}

function renderShelves(shelves) {
  const container = document.getElementById('shelves-container');

  if (!shelves || shelves.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="icon">🍺</div>
      <p>This section hasn't been filled in yet.<br>Tell Bushi what goes here!</p>
    </div>`;
    return;
  }

  container.innerHTML = shelves.map((shelf, si) => {
    // Fill empty slots up to shelf.slots count
    const products = [...shelf.products];
    if (shelf.slots) {
      while (products.length < shelf.slots) {
        products.push({ name: "Empty", detail: "—", type: "empty" });
      }
    }

    const rows = products.map((p, idx) => {
      const color = TYPE_COLOR[p.type] || '#888';
      const isEmpty = p.type === 'empty';
      return `
        <div class="product-row ${isEmpty ? 'empty-row' : ''}">
          <div class="slot-num">${idx + 1}</div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            ${p.detail && p.detail !== '—' ? `<div class="product-detail">${p.detail}</div>` : ''}
          </div>
          <div class="product-dot" style="background:${color}${isEmpty ? '; border:1px dashed #555' : ''}"></div>
        </div>`;
    }).join('');

    return `
      <div class="shelf">
        <div class="shelf-header">
          <span class="shelf-name">${shelf.name}</span>
          ${shelf.slots ? `<span class="shelf-slots">${shelf.slots} slots</span>` : ''}
        </div>
        ${rows}
      </div>`;
  }).join('');
}

function showSection(num) {
  document.getElementById(`tab-${current}`).classList.remove('active');
  document.getElementById(`tab-${num}`).classList.add('active');
  current = num;

  const s = sections[num];
  document.getElementById('section-title').textContent = s.title;

  const tag = document.getElementById('section-tag');
  tag.textContent = s.tag;
  tag.className = `section-tag ${s.tagColor}`;

  renderShelves(s.shelves);
  window.scrollTo(0, 0);
}

buildTabs();
showSection(1);
</script>
</body>
</html>
